id: youtube.thumbnail-generator
name: Thumbnail Generator
domain: youtube
canonical_version: 1.1.0
status: active
summary: Create click-driven thumbnail concepts and testing variants.
inputs:
  - video_topic
  - target_emotion
  - brand_guidelines
  - desired_variants
