  - constraints
outputs:
  - thumbnail_strategy
  - thumbnail_concepts
  - short_copy
  - layout_suggestions
  - ab_test_ideas
supported_agents:
  claude:
    status: supported
    adapter_version: 1.1.0
  codex:
    status: supported
    adapter_version: 1.1.0
  opencode:
    status: supported
    adapter_version: 1.1.0
